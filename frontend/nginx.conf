server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstreams resolve lazily at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/chat {
        set $intel_upstream http://intel:8000;
        proxy_pass $intel_upstream;
        proxy_set_header Host $host;
    }

    location /api/v1/recommendations {
        set $intel_upstream http://intel:8000;
        proxy_pass $intel_upstream;
        proxy_set_header Host $host;
    }

    location /api/v1/insights {
        set $intel_upstream http://intel:8000;
        proxy_pass $intel_upstream;
        proxy_set_header Host $host;
    }

    location /api/v1/ {
        set $core_upstream http://core:8080;
        proxy_pass $core_upstream;
        proxy_set_header Host $host;
    }
}
